<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
            padding: 20px;
        }

        .container {
            background-color: #fff;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #ddd;
            max-width: 600px;
            margin: auto;
        }

        .header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .error-details {
            background-color: #ffe6e6;
            padding: 10px;
            border-left: 4px solid #ff5c5c;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .proceso-id {
            font-size: 13px;
            margin-bottom: 8px;
            color: #555;
        }

        .highlight {
            font-weight: bold;
            color: #d9534f;
        }

        ul {
            margin: 8px 0 0 20px;
        }

        .footer {
            color: #666;
            font-size: 12px;
            margin-top: 16px;
        }

        .logos {
            margin-top: 20px;
            padding-top: 12px;
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
        }

        .logos img {
            height: 36px;
            width: auto;
        }
    </style>
</head>
